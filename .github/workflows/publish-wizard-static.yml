name: Publish Wizard Static

on:
  push:
    branches:
      - main
    paths:
      - 'wizard/web/**'
      - 'wizard/core/**'
      - 'scripts/publish-wizard-static.sh'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-wizard-static
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wizard/web/package-lock.json

      - name: Build wizard
        run: |
          cd wizard/web
          npm ci
          npm run build

      - name: Publish static files into wizard/
        run: scripts/publish-wizard-static.sh

      - name: Commit updated wizard static files
        run: |
          if git diff --quiet -- wizard/index.html wizard/assets; then
            echo "Wizard static files already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wizard/index.html wizard/assets
          git commit -m "chore(wizard): refresh published static files [skip ci]"
          git push
