services:
  terminal:
    build:
      context: ../..
      dockerfile: hosting/apps/terminal/Dockerfile
    container_name: terminal
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    tmpfs:
      - /tmp:mode=1777,size=512m
      - /home/terminal:mode=0700,size=64m
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.terminal.rule=Host(\`${TERMINAL_HOSTNAME?}\`)"
      - "traefik.http.routers.terminal.entrypoints=websecure"
      - "traefik.http.routers.terminal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.terminal.middlewares=terminal-ratelimit@docker"
      - "traefik.http.services.terminal.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.terminal-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.terminal-ratelimit.ratelimit.burst=10"
      - "traefik.http.middlewares.terminal-ratelimit.ratelimit.period=1m"
    profiles:
      - terminal
      - all
